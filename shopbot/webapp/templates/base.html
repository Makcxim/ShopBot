{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Маркетплейс ключей{% endblock %}</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/webapp.css' %}" rel="stylesheet">
</head>
<body>
    <main class="app-content container px-3 py-3">
        <a id="back-link" class="back-link d-none" href="#">← Назад</a>
        {% block content %}{% endblock %}
    </main>

    {% include 'includes/navbar.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/webapp.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
