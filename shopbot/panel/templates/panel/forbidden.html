<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет доступа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container" style="max-width: 520px; padding-top: 12vh;">
    <div class="text-center">
        <div style="font-size: 4rem;">🔒</div>
        <h1 class="h4 mt-3">Нет доступа</h1>
        <p class="text-muted">{{ message }}</p>
        <div class="d-flex flex-column gap-2 mt-4">
            {% if has_access %}
                <a href="{% url 'panel_dashboard' %}" class="btn btn-primary">В дашборд</a>
            {% else %}
                <a href="{% url 'panel_shop_create' %}" class="btn btn-primary">Создать магазин</a>
            {% endif %}
            <a href="/" class="btn btn-outline-secondary">На витрину</a>
            <a href="#" onclick="history.back(); return false;" class="btn btn-link">← Назад</a>
        </div>
    </div>
</div>
</body>
</html>
